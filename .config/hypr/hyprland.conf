#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,adw-gtk3-dark
env = GDK_BACKEND,wayland
env = GTK_THEME,adw-gtk3-dark
env = GTK_APPLICATION_PREFER_DARK_THEME,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

QT_QPA_PLATFORMTHEME=qt5ct
QT_STYLE_OVERRIDE=kvantum

$mainMod = SUPER
$terminal = kitty
$fileManager = nemo
$menu = rofi -show drun
$browser = Firefox
 
##################
### WINDOWRULE ###
##################
windowrule = match:class nemo, opacity 0.90 0.85
windowrule = match:class Google-chrome, opacity 0.80 0.80
windowrule = match:class zed, opacity 0.6
 
################
### MONITORS ###
################
monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################

exec-once = waypaper --wallpaper "~/.local/share/Star-Wars-Rice/images/starwars.png"
exec-once = waybar
exec-once = nm-applet &
exec-once = $terminal

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 10

    border_size = 1

    col.active_border = rgba(bfc5d0dd)
    col.inactive_border = rgba(2a2f3aaa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 7
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = rgba(00000099)
    }

    blur {
        enabled = true
        size = 4
        passes = 5
        new_optimizations = true
        xray = false

        vibrancy = 1
        vibrancy_darkness = 0.38
    }
}

animations {
    enabled = yes

    # Curves
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = snap, 0.23, 1, 0.32, 1
    bezier = bounce, 0.35, 1.15, 0.65, 1

    # Global
    animation = global,        1, 15, default

    # Borders
    animation = border,        1, 10, quick

    # Windows (pop in/out effect)
    animation = windows,       1, 6, bounce
    animation = windowsIn,     1, 5, bounce
    animation = windowsOut,    1, 6.5, bounce

    # Fade
    animation = fadeIn,        1, 0.5, quick
    animation = fadeOut,       1, 0.4, quick
    animation = fade,          1, 1.0, quick

    # Layers
    animation = layers,        1, 4, snap
    animation = layersIn,      1, 3.5, snap, slide
    animation = layersOut,     1, 3.5, snap, slide
    animation = fadeLayersIn,  1, 0.3, quick
    animation = fadeLayersOut, 1, 0.2, quick

    # Workspaces (tiny bounce + quicker slide)
    animation = workspaces,    1, 5.5, bounce, slide
    animation = workspacesIn,  1, 5.5, bounce, slide
    animation = workspacesOut, 1, 4, quick, slide

    animation = zoomFactor,    1, 10, quick
}


dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    # Append caps:escape if you would like to rebind caps to escape.
    kb_options = grp:win_space_toggle,compose:ralt
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

bind = SUPER, o, exec, nemo
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit,
bind = $mainMod, ", exec, $browser

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = SUPER, B, exec, flatpak run app.zen_browser.zen

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = ,XF86KbdBrightnessDown,exec,brightnessctl -d smc::kbd_backlight set 10%-
bind = ,XF86KbdBrightnessUp,exec,brightnessctl -d smc::kbd_backlight set 10%+
